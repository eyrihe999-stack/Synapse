services:
  synapse:
    image: localhost:5001/synapse:${SERVER_TAG:-latest}
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - DB_HOST=synapse-mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - DB_DATABASE=synapse
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # pgvector on Postgres;空值时 synapse 启动期向量能力降级。
      - PG_HOST=synapse-pg
      - PG_PORT=5432
      - PG_USERNAME=postgres
      - PG_PASSWORD=synapse123
      - PG_DATABASE=synapse
      - PG_SSL_MODE=disable
      # Azure OpenAI embedding key;真实值从 ./env 注入,yaml 里只留引用
      - AZURE_EMBEDDING_API_KEY=${AZURE_EMBEDDING_API_KEY:-}
      # Aliyun OSS key(没填时 Synapse 启动期 document 模块自动禁用 → /documents 路由 404)
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
    networks:
      - synapse-net
    restart: unless-stopped

  synapse-web:
    image: localhost:5001/synapse-web:${WEB_TAG:-latest}
    build:
      context: ../Synapse-Web
    ports:
      - "3080:8080"
    depends_on:
      - synapse
    networks:
      - synapse-net
    restart: unless-stopped

networks:
  synapse-net:
    external: true
