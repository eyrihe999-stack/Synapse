services:
  synapse:
    image: localhost:5001/synapse:${SERVER_TAG:-latest}
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      # SYNAPSE_INSTANCE_ID 固定 Redis Streams consumer name,跨容器重建复用同名 consumer,
      # 避免 group 里累积 stale。**每实例必须唯一**;同 ID 多个实例会让 Redis 把它们当
      # 同一 logical consumer,PEL 互相覆盖 + 关闭时互相清掉。
      #
      # 单实例(默认):什么都不用做,自动用 "synapse-1"。
      #
      # 多实例(同机):每个实例 export 不同 ID + 用不同 -p project 启动,例如:
      #   SYNAPSE_INSTANCE_ID=synapse-2 docker compose -p synapse-2 up -d synapse
      #   SYNAPSE_INSTANCE_ID=synapse-3 docker compose -p synapse-3 up -d synapse
      #
      # 多实例(swarm/k8s 编排,自动):
      #   - swarm:  SYNAPSE_INSTANCE_ID=synapse-{{.Task.Slot}}
      #   - K8s:    valueFrom.fieldRef.fieldPath: metadata.name(synapse-0/1/2)
      - SYNAPSE_INSTANCE_ID=${SYNAPSE_INSTANCE_ID:-synapse-1}
      - DB_HOST=synapse-mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - DB_DATABASE=synapse
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # pgvector on Postgres;空值时 synapse 启动期向量能力降级。
      - PG_HOST=synapse-pg
      - PG_PORT=5432
      - PG_USERNAME=postgres
      - PG_PASSWORD=synapse123
      - PG_DATABASE=synapse
      - PG_SSL_MODE=disable
      # Azure OpenAI embedding key;真实值从 ./env 注入,yaml 里只留引用
      - AZURE_EMBEDDING_API_KEY=${AZURE_EMBEDDING_API_KEY:-}
      # Aliyun OSS key(没填时 Synapse 启动期 document 模块自动禁用 → /documents 路由 404)
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
    volumes:
      # 真秘钥走 gitignored config.local.yaml,只读挂载进容器;配合 APP_ENV=local 被 config loader 读到
      - ./config/config.local.yaml:/app/config/config.local.yaml:ro
    networks:
      - synapse-net
    restart: unless-stopped

  synapse-web:
    image: localhost:5001/synapse-web:${WEB_TAG:-latest}
    build:
      context: ../Synapse-Web
    ports:
      - "3080:8080"
    depends_on:
      - synapse
    networks:
      - synapse-net
    restart: unless-stopped

networks:
  synapse-net:
    external: true
