<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse 组织邀请</title>
    <style>
        :root {
            --system-gray: #86868b;
            --system-blue: #0066CC;
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 580px; margin: 0 auto; background: var(--card-bg);
            border-radius: 18px; padding: 60px 48px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .header { text-align: center; margin-bottom: 48px; }
        .logo { font-size: 24px; font-weight: 600; color: var(--text-primary); }
        .content { text-align: center; }
        .title { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
        .subtitle { font-size: 17px; color: #1d1d1f; margin-bottom: 40px; }
        .cta-section { margin-bottom: 48px; }
        .cta-button {
            display: inline-block;
            padding: 14px 36px;
            background: var(--system-blue);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 999px;
            font-size: 17px;
            font-weight: 500;
        }
        .fallback-link {
            margin-top: 24px;
            font-size: 13px;
            color: var(--system-gray);
            word-break: break-all;
        }
        .fallback-link a { color: var(--system-blue); text-decoration: none; }
        .details {
            border-top: 1px solid #d2d2d7; padding-top: 32px;
            text-align: left; margin-bottom: 40px;
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .detail-label { color: var(--system-gray); }
        .detail-value { color: #1d1d1f; font-weight: 500; }
        .footer {
            text-align: center; font-size: 12px; color: var(--system-gray); margin-top: 40px;
        }
        .footer a { color: var(--system-blue); text-decoration: none; }
        .footer-divider { margin: 24px 0; border: 0; border-top: 1px solid #d2d2d7; }
        @media (max-width: 600px) {
            .container { padding: 40px 24px; border-radius: 0; box-shadow: none; background: transparent; }
            body { background: #ffffff; padding: 0; }
            .title { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Synapse</div>
    </div>
    <div class="content">
        <h1 class="title">{{.Title}}</h1>
        <p class="subtitle">
            <strong>{{.InviterName}}</strong> 邀请您{{.ActionText}}<br>
            <strong>{{.OrgName}}</strong>。
        </p>
        <div class="cta-section">
            <a href="{{.Link}}" class="cta-button">查看邀请</a>
            <p class="fallback-link">
                或复制链接到浏览器打开：<br>
                <a href="{{.Link}}">{{.Link}}</a>
            </p>
        </div>
    </div>
    <div class="details">
        <div class="detail-row">
            <span class="detail-label">邀请类型</span>
            <span class="detail-value">{{.TypeLabel}}</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">角色</span>
            <span class="detail-value">{{.RoleLabel}}</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">过期时间</span>
            <span class="detail-value">{{.ExpiresAt}}</span>
        </div>
    </div>
    <div class="footer">
        <p>如果您不认识邀请人，请直接忽略此邮件。</p>
        <hr class="footer-divider">
        <p>&copy; 2025 Synapse. All rights reserved.</p>
    </div>
</div>
</body>
</html>
